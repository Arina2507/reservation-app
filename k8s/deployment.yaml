apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-app
  template:
    metadata:
      labels:
        app: reservation-app
    spec:
      containers:
        - name: reservation-app
          image: ghcr.io/Arina2507/reservation-app:latest
          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: app-config

          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /reservations
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10